{% extends "base.html" %}
{% block title %}Sign In – TruthGuard AI{% endblock %}
{% block navbar %}{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div style="font-size:2.5rem;margin-bottom:8px">🛡</div>
      <h1>TruthGuard AI</h1>
      <p>Sign in to your account</p>
    </div>

    {% if error %}
    <div class="alert alert-error">✕ {{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}" autocomplete="on">
      <div class="form-group">
        <label class="form-label" for="identifier">Username or Email</label>
        <input type="text" id="identifier" name="identifier"
               class="form-input" placeholder="Enter username or email"
               value="{{ identifier or '' }}" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" name="password"
               class="form-input" placeholder="Enter password"
               required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px">
        🔓 Sign In
      </button>
    </form>

    <div class="auth-divider">or</div>

    <p style="text-align:center;font-size:.88rem;color:var(--text-secondary)">
      Don't have an account?
      <a href="{{ url_for('register') }}" style="color:var(--neon-cyan);text-decoration:none;font-weight:600">
        Create one →
      </a>
    </p>
  </div>
</div>
{% endblock %}
